<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Portal</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
<main>
  <!-- ADMIN LOGIN -->
  <section id="adminLogin" class="active">
    <h2>Admin Login</h2>
    <form id="LoginForm" novalidate>
      <label for="adminUsername">Username</label>
      <input id="adminUsername" name="adminUsername" required type="text" placeholder="Enter admin username" />
      <label for="adminPassword">Password</label>
      <input id="adminPassword" name="adminPassword" required type="password" placeholder="Enter admin password" />
      <button type="submit">Login</button>
    </form>
     </section>

  <!-- ADMIN PORTAL -->
  <section id="adminPortal">
    <header><h1>College Complaint </h1></header>
    <h2>Admin Portal <span id="newComplaintBadge"></span></h2>

    <table id="complaintsTable">
      <thead>
        <tr><th>Name</th><th>Roll No</th><th>Email</th><th>Mobile</th><th>Category</th><th>Message</th><th>Status</th><th>Actions</th></tr>
      </thead>
      <tbody></tbody>
    </table>

    <div style="display: flex; justify-content: space-between; align-items: center; margin: 20px 0; padding: 0 10px;">
              <button id="logoutBtn" style="padding: 10px 25px; font-size: 0.95rem; margin-right: 10px;">
          Logout
        </button>
        
      </div>
      
      
      
  </section>
</main>
<script src="script.js"></script>
</body>
</html>
